name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Install zip
        run: sudo apt-get update -y && sudo apt-get install -y zip

      - name: Prepare release zip
        run: |
          set -e
          mkdir -p dist
          # Create zip with module files at archive root (standard for Foundry module installs)
          # Exclude dev-only sources, deps, and CI config
          zip -r dist/pf2e-ai-npc-generator.zip . \
            -x "node_modules/*" \
               ".git/*" \
               "src/*" \
               "package.json" \
               "package-lock.json" \
               "tsconfig.json" \
               ".github/*" \
               "dist/*" \
               ".gitignore" \
               ".gitattributes"

      - name: Prepare module.json for release
        run: |
          # Copy the module.json as-is (it should have version matching the tag)
          cp module.json dist/module.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pf2e-ai-npc-generator.zip
            dist/module.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output manifest URL hint
        run: |
          echo "Recommended fields in module.json for this release:"
          echo '  "manifest": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json"'
          echo '  "download": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pf2e-ai-npc-generator.zip"'
