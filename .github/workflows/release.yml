name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Prepare release zip
        run: |
          mkdir -p dist
          # Create a zip that contains the module folder at the root of the zip
          # This is what Foundry's "Install Module" expects when it extracts
          cd ..
          zip -r pf2e-ai-npc-generator/pf2e-ai-npc-generator.zip pf2e-ai-npc-generator \
            -x "pf2e-ai-npc-generator/node_modules/*" \
            -x "pf2e-ai-npc-generator/.git/*" \
            -x "pf2e-ai-npc-generator/src/*" \
            -x "pf2e-ai-npc-generator/*.ts" \
            -x "pf2e-ai-npc-generator/package*.json" \
            -x "pf2e-ai-npc-generator/tsconfig.json" \
            -x "pf2e-ai-npc-generator/.github/*" \
            -x "pf2e-ai-npc-generator/dist/*"
          mv pf2e-ai-npc-generator/pf2e-ai-npc-generator.zip pf2e-ai-npc-generator/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pf2e-ai-npc-generator.zip
          # The module.json in the repo root is used by users for manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output manifest URL hint
        run: |
          echo "After release, set in module.json:"
          echo '  "manifest": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json"'
          echo '  "download": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pf2e-ai-npc-generator.zip"'
