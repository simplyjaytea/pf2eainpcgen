name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Prepare release zip
        run: |
          mkdir -p dist
          # Stage only the files we want to ship, under the module id folder
          rm -rf staging
          mkdir -p staging/pf2e-ai-npc-generator
          rsync -a \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'src' \
            --exclude 'package*.json' \
            --exclude 'tsconfig.json' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude 'staging' \
            --exclude '.gitignore' \
            . staging/pf2e-ai-npc-generator/
          cd staging
          zip -r ../dist/pf2e-ai-npc-generator.zip pf2e-ai-npc-generator
          cd ..
          rm -rf staging

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pf2e-ai-npc-generator.zip
          # The module.json in the repo root is used by users for manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output manifest URL hint
        run: |
          echo "After release, set in module.json:"
          echo '  "manifest": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json"'
          echo '  "download": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pf2e-ai-npc-generator.zip"'
